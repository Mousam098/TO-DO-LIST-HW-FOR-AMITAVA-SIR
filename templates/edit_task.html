<!DOCTYPE html>
<html>

<head>
    <title>Edit Task</title>
</head>

<body>

    <h1>Edit Task</h1>

    <form method="POST">

        <input
            type="text"
            name="title"
            value="{{ task.title }}"
            required
        >

        <br><br>

        <textarea name="description">{{ task.description }}</textarea>

        <br><br>

        <select name="status">

            <option
                value="Pending"
                {% if task.status == "Pending" %}selected{% endif %}
            >
                Pending
            </option>

            <option
                value="Completed"
                {% if task.status == "Completed" %}selected{% endif %}
            >
                Completed
            </option>

        </select>

        <br><br>

        <select name="priority">

            <option
                value="High"
                {% if task.priority == "High" %}selected{% endif %}
            >
                High
            </option>

            <option
                value="Medium"
                {% if task.priority == "Medium" %}selected{% endif %}
            >
                Medium
            </option>

            <option
                value="Low"
                {% if task.priority == "Low" %}selected{% endif %}
            >
                Low
            </option>

        </select>

        <br><br>

        <button type="submit">Update Task</button>

    </form>

</body>

</html>
