<!DOCTYPE html>
<html>

<head>
    <title>TODO App</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>TODO LIST APPLICATION</h1>

    <a href="/add">Add New Task</a>

    <hr>

    <table border="1">

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Action</th>
        </tr>

        {% for task in tasks %}

        <tr>
            <td>{{ task.id }}</td>
            <td>{{ task.title }}</td>
            <td>{{ task.description }}</td>
            <td>{{ task.status }}</td>
            <td>{{ task.priority }}</td>
            <td>
                 <a href="/edit/{{ task.id }}">Edit</a>

                 <a href="/delete/{{ task.id }}">Delete</a>
            </td>
        </tr>

        {% endfor %}

    </table>

</body>

</html>
